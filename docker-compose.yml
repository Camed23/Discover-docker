services:
  backend:
    build: ./backend-api/demo
    networks:
      - app-network
    depends_on:
      - database
    restart: unless-stopped

  database:
    build: ./database
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: usr
      POSTGRES_PASSWORD: pwd
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

  httpd:
    build: ./http-server
    ports:
      - "80:80"
    networks:
      - app-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  app-network:

volumes:
  pgdata: