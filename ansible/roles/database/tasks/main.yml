---
# tasks file for roles/database
- name: Run PostgreSQL database
  community.docker.docker_container:
    name: database
    image: faridlp/my-database:1.0
    state: started
    restart_policy: always
    networks:
      - name: app-network
    env:
      POSTGRES_DB: db
      POSTGRES_USER: usr
      POSTGRES_PASSWORD: pwd
    volumes:
      - pgdata:/var/lib/postgresql/data